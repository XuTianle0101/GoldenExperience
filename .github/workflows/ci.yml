name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"
      - name: Lint and format
        run: |
          # These v4 files are frozen by the published executable/test hashes.
          python -m ruff format --check . \
            --exclude goldenexperience/size_variant/v5_directional_fit.py \
            --exclude goldenexperience/size_variant/v5_fit.py \
            --exclude goldenexperience/size_variant/v5_generation.py \
            --exclude tests/test_v5_directional_fit.py \
            --exclude tests/test_v5_fit.py
          python -m ruff check .
      - name: Type check
        run: python -m mypy goldenexperience
      - name: Test with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage report
      - name: Build distributions
        run: python -m build
      - name: Smoke-test wheel entry points
        run: |
          python -m venv /tmp/goldenexperience-wheel-smoke
          /tmp/goldenexperience-wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/goldenexperience-wheel-smoke/bin/golden-patch-manifest --help
          /tmp/goldenexperience-wheel-smoke/bin/golden-publication-benchmark --help
