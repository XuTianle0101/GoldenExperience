experiment:
  name: goldenexperience_cross_model_reuse_m0
  runtime_stack:
    inference_engine: vllm
    cache_backend: lmcache_mp
    l2_backend: mooncake_store
    goldenexperience_role: lmcache_patch_control_plane
  primary_metric: ttft_delta_with_quality_gated_reuse

runtime:
  install:
    vllm: external_or_third_party_clone
    lmcache: external_or_third_party_clone
    mooncake: external_or_third_party_clone
  lmcache_config_path: configs/lmcache.example.yaml
  kv_baseline_script: scripts/kv_baseline/run_vllm_lmcache_mooncake_kv_baseline.sh
  patch_manifest: docs/patch_manifest.md

reuse_scenarios:
  lora_adapter:
    enabled: true
    strategy: adapter_delta_gated_alias
    required_gates:
      - same_base_model_id
      - same_tokenizer_id
      - same_kv_shape
      - lora_delta_quality_gate
  golden_scale:
    enabled: true
    bidirectional: true
    strategy: layerwise_projection
    default_pair: qwen3_8b_14b
    shadow_mode_first: true
    required_gates:
      - same_family_architecture
      - tokenizer_alignment
      - layer_mapping
      - projection_calibration
      - artifact_hash_match
      - runtime_cost_gate
  cross_base_model:
    enabled: false
    strategy: learned_cross_base_translator
    required_gates:
      - calibration_dataset
      - tokenizer_bridge
      - learned_translator
      - probe_quality_gate
      - task_allowlist

model_pairs:
  - name: base_to_lora
    scenario: lora_adapter
    source_model_id: qwen3-8b
    target_model_id: qwen3-8b-lora-math
    tokenizer_id: qwen3
    base_model_id: qwen3-8b
  - name: small_to_large
    scenario: golden_scale
    source_model_id: Qwen/Qwen3-8B
    target_model_id: Qwen/Qwen3-14B
    tokenizer_id: Qwen/Qwen3
    direction: small_to_large
    calibration_id: qwen3_8b_to_14b_projection_v0
    artifact_uri: artifacts/golden_scale/qwen3_8b_to_14b_projection_v0.json
  - name: large_to_small
    scenario: golden_scale
    source_model_id: Qwen/Qwen3-14B
    target_model_id: Qwen/Qwen3-8B
    tokenizer_id: Qwen/Qwen3
    direction: large_to_small
    calibration_id: qwen3_14b_to_8b_projection_v0
    artifact_uri: artifacts/golden_scale/qwen3_14b_to_8b_projection_v0.json

quality_gates:
  min_lora_confidence: 0.95
  min_projection_confidence: 0.85
  min_cross_base_confidence: 0.70
  max_probe_logit_drift: null
  max_task_score_drop: null
  golden_scale:
    min_kv_cosine: 0.90
    min_attention_proxy_cosine: 0.95
    max_perplexity_drift_pct: 5.0
    max_task_score_drop_pct: 2.0
    max_materialization_to_prefill_ratio: 0.70

benchmarks:
  workloads:
    - lora_multi_tenant_chat
    - rag_prefix_sharing
    - agent_tool_schema_reuse
    - golden_scale_fallback_serving
  metrics:
    - ttft_ms
    - ttft_delta_ms
    - accepted_reuse_rate
    - cross_model_cache_hit_rate
    - secondary_lookup_latency_ms
    - materialization_latency_ms
    - fallback_rate_by_reason
    - quality_gate_pass_rate
