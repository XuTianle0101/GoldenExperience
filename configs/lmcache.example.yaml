# Placeholder for upstream LMCache configuration used by GoldenExperience experiments.
# GoldenExperience should not redefine storage/offload policy here; keep those settings
# in the format expected by the installed LMCache version.
# The recommended same-model baseline is generated by
# scripts/kv_baseline/run_vllm_lmcache_mooncake_kv_baseline.sh and uses vLLM + LMCache MP +
# Mooncake Store. See configs/kv_baseline_mooncake.env.example for those defaults.
goldenexperience:
  enable_cross_model_reuse: true
  patch_manifest: docs/patch_manifest.md
  fallback_on_unready_plan: true
